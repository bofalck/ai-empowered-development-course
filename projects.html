<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - After The Noise</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="portfolio-header">
        <div class="header-content">
            <h1 class="site-title">
                <span>After</span>
                <span>The</span>
                <span>Noise</span>
            </h1>
            <nav class="header-nav desktop-only">
                <a href="/" class="nav-link">Home</a>
                <a href="/projects.html" class="nav-link">Projects</a>
                <a href="/blog.html" class="nav-link">Blog</a>
            </nav>
            <div class="header-actions desktop-only">
                <div class="theme-selector" id="themeSelector">
                    <button class="theme-btn" data-theme="anime" title="Anime theme">🖋️</button>
                    <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                    <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                    <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                </div>
                <div id="authActions">
                    <button id="logoutBtn" class="btn-logout" style="display: none;">Sign Out</button>
                </div>
            </div>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-inner">
                <nav class="mobile-nav" id="mobileNav">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/projects.html" class="nav-link">Projects</a>
                    <a href="/blog.html" class="nav-link">Blog</a>
                </nav>
                <div class="mobile-menu-divider"></div>
                <div class="mobile-theme-section">
                    <span class="mobile-menu-label">Theme</span>
                    <div class="theme-selector">
                        <button class="theme-btn" data-theme="anime" title="Anime theme">🖋️</button>
                        <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                        <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                        <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                    </div>
                </div>
                <div class="mobile-menu-divider"></div>
                <div class="mobile-auth" id="mobileAuthActions"></div>
            </div>
        </div>
    </header>

    <main class="portfolio-main">
        <div class="collection-page">
            <div class="collection-header">
                <h1>Projects</h1>
                <a href="/" class="back-link">← Back to Portfolio</a>
            </div>

            <div id="filterBar" class="filter-bar"></div>

            <div id="projectsGrid" class="items-grid">
                <div class="empty-state">
                    <p>Loading projects...</p>
                </div>
            </div>
        </div>
    </main>

    <script type="module">
        import { applyTheme, setupThemeSwitcher } from './auth.js';
        applyTheme();
        setupThemeSwitcher();
    </script>
    <script type="module" src="projects-page.js"></script>
</body>
</html>
