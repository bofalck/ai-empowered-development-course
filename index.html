<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <h1>After The Noise</h1>
            <p class="subtitle">Portfolio & Projects</p>

            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>

                <button type="submit" class="btn-login">Sign In</button>
            </form>

            <div class="login-divider">or</div>

            <button id="guestBtn" class="btn-guest">Continue as Guest</button>

            <p class="login-hint">Demo: Use any email/password for guest, admin credentials for full access</p>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
</body>
</html>
