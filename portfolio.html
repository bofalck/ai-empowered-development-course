<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="portfolio-header">
        <div class="header-content">
            <div class="header-spacer"></div>
            <div class="header-actions">
                <div class="theme-selector" id="themeSelector">
                    <button class="theme-btn" data-theme="default" title="Default theme">☀️</button>
                    <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                    <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                    <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                </div>
                <button id="logoutBtn" class="btn-logout">Sign Out</button>
            </div>
            <h1 class="site-title">
                <span>After</span>
                <span>The</span>
                <span>Noise</span>
            </h1>
        </div>
    </header>

    <main class="portfolio-main">
        <div class="widgets-grid">
            <!-- Blog Widget -->
            <section id="blog" class="widget widget-blog">
                <div class="widget-header">
                    <h2>Blog</h2>
                </div>
                <div id="blogContainer" class="widget-content"></div>
            </section>

            <!-- Projects Widget -->
            <section id="projects" class="widget widget-projects">
                <div class="widget-header">
                    <h2>Selected Projects</h2>
                </div>
                <div id="projectsContainer" class="widget-content"></div>
            </section>

            <!-- About Widget -->
            <section id="about" class="widget widget-about">
                <div class="widget-header">
                    <h2>About Me</h2>
                </div>
                <div id="aboutContainer" class="widget-content"></div>
            </section>

            <!-- CV Widget -->
            <section id="cv" class="widget widget-cv">
                <div class="widget-header">
                    <h2>CV</h2>
                </div>
                <div id="cvContainer" class="widget-content"></div>
            </section>

            <!-- Applications Widget -->
            <section id="apps" class="widget widget-apps">
                <div class="widget-header">
                    <h2>Applications</h2>
                </div>
                <div class="widget-content">
                    <div class="apps-grid">
                        <div class="app-card" id="transcriberApp">
                            <div class="app-icon">📝</div>
                            <h3>Transcriber</h3>
                            <p>Record, transcribe, and analyze meetings</p>
                            <button class="btn-launch">Launch App</button>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Hidden app frame -->
    <iframe id="appFrame" class="app-frame hidden"></iframe>

    <script type="module">
        import { restoreSession, isLoggedIn } from './auth.js';

        // Check auth before loading portfolio
        if (!restoreSession() || !isLoggedIn()) {
            window.location.href = '/';
        }
    </script>
    <script type="module" src="portfolio.js"></script>
</body>
</html>
