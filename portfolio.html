<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
</head>
<body>
    <header class="portfolio-header">
        <div class="header-content">
            <h1 class="site-title">
                <span>After</span>
                <span>The</span>
                <span>Noise</span>
            </h1>
            <nav class="header-nav desktop-only">
                <a href="/" class="nav-link">Home</a>
                <a href="/projects.html" class="nav-link">Projects</a>
                <a href="/blog.html" class="nav-link">Blog</a>
            </nav>
            <div class="header-actions desktop-only">
                <div class="theme-selector" id="themeSelector">
                    <button class="theme-btn" data-theme="anime" title="Anime theme">🖋️</button>
                    <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                    <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                    <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                </div>
                <div id="authActions">
                    <button id="logoutBtn" class="btn-logout" style="display: none;">Sign Out</button>
                </div>
            </div>
            <button class="hamburger-btn" id="hamburgerBtn" aria-label="Open menu" aria-expanded="false">
                <span></span>
                <span></span>
                <span></span>
            </button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <div class="mobile-menu-inner">
                <nav class="mobile-nav" id="mobileNav">
                    <a href="/" class="nav-link">Home</a>
                    <a href="/projects.html" class="nav-link">Projects</a>
                    <a href="/blog.html" class="nav-link">Blog</a>
                </nav>
                <div class="mobile-menu-divider"></div>
                <div class="mobile-theme-section">
                    <span class="mobile-menu-label">Theme</span>
                    <div class="theme-selector">
                        <button class="theme-btn" data-theme="anime" title="Anime theme">🖋️</button>
                        <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                        <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                        <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                    </div>
                </div>
                <div class="mobile-menu-divider"></div>
                <div class="mobile-auth" id="mobileAuthActions"></div>
            </div>
        </div>
    </header>

    <main class="portfolio-main">
        <div class="widgets-grid">
            <!-- Blog Widget -->
            <section id="blog" class="widget widget-blog">
                <div class="widget-header">
                    <h2>Blog</h2>
                </div>
                <div id="blogContainer" class="widget-content"></div>
            </section>

            <!-- Projects Widget -->
            <section id="projects" class="widget widget-projects">
                <div class="widget-header">
                    <h2>Selected Projects</h2>
                </div>
                <div id="projectsContainer" class="widget-content"></div>
            </section>

            <!-- About Widget -->
            <section id="about" class="widget widget-about">
                <div class="widget-header">
                    <h2>About Me</h2>
                </div>
                <div id="aboutContainer" class="widget-content"></div>
            </section>

            <!-- CV Widget -->
            <section id="cv" class="widget widget-cv">
                <div class="widget-header">
                    <h2>CV</h2>
                </div>
                <div id="cvContainer" class="widget-content"></div>
            </section>

            <!-- Transcriber Application Widget -->
            <section id="transcriber" class="widget widget-transcriber">
                <div class="widget-header">
                    <div class="widget-title-wrapper">
                        <h2>Transcriber</h2>
                        <span class="widget-badge">Application</span>
                    </div>
                </div>
                <div class="widget-content">
                    <div class="app-card" id="transcriberApp">
                        <div class="app-icon">📝</div>
                        <p>Record, transcribe, and analyze meetings</p>
                        <button class="btn-launch">Launch App</button>
                    </div>
                </div>
            </section>

            <!-- Magical Unicorns Application Widget -->
            <section id="magical-unicorns" class="widget widget-magical-unicorns">
                <div class="widget-header">
                    <div class="widget-title-wrapper">
                        <h2>Magical Unicorns - The Game</h2>
                        <span class="widget-badge">Application</span>
                    </div>
                </div>
                <div class="widget-content">
                    <div class="app-card" id="magicalUnicornsApp">
                        <div class="app-icon">🦄</div>
                        <p>Coming to you soon</p>
                        <button class="btn-launch" disabled>Launch App</button>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- Hidden app frame -->
    <iframe id="appFrame" class="app-frame hidden"></iframe>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
