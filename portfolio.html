<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - Portfolio</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="portfolio-header">
        <div class="header-content">
            <h1 class="site-title">After The Noise</h1>
            <nav class="portfolio-nav">
                <a href="#blog" class="nav-link">Blog</a>
                <a href="#projects" class="nav-link">Projects</a>
                <a href="#about" class="nav-link">About</a>
                <a href="#cv" class="nav-link">CV</a>
            </nav>
            <div class="header-actions">
                <div class="theme-selector" id="themeSelector">
                    <button class="theme-btn" data-theme="default" title="Default theme">☀️</button>
                    <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                    <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                    <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                </div>
                <button id="logoutBtn" class="btn-logout">Sign Out</button>
            </div>
        </div>
    </header>

    <main class="portfolio-main">
        <!-- Blog Section -->
        <section id="blog" class="portfolio-section">
            <h2>Blog</h2>
            <div id="blogContainer" class="blog-grid"></div>
        </section>

        <!-- Projects Section -->
        <section id="projects" class="portfolio-section">
            <h2>Selected Projects</h2>
            <div id="projectsContainer" class="projects-grid"></div>
        </section>

        <!-- About Section -->
        <section id="about" class="portfolio-section">
            <h2>About Me</h2>
            <div id="aboutContainer" class="about-content"></div>
        </section>

        <!-- CV Section -->
        <section id="cv" class="portfolio-section">
            <h2>CV</h2>
            <div id="cvContainer" class="cv-content"></div>
        </section>

        <!-- Apps Grid -->
        <section id="apps" class="portfolio-section apps-section">
            <h2>Applications</h2>
            <div class="apps-grid">
                <div class="app-card" id="transcriberApp">
                    <div class="app-icon">📝</div>
                    <h3>Transcriber</h3>
                    <p>Record, transcribe, and analyze meetings</p>
                    <button class="btn-launch">Launch App</button>
                </div>
            </div>
        </section>
    </main>

    <!-- Hidden app frame -->
    <iframe id="appFrame" class="app-frame hidden"></iframe>

    <script type="module" src="portfolio.js"></script>
</body>
</html>
