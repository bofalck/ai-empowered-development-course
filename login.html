<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes, viewport-fit=cover">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>After the Noise - Sign In</title>
    <link rel="stylesheet" href="login.css">
</head>
<body>
    <div class="login-container">
        <div id="loginPanel" class="panel active">
            <div class="panel-content">
                <div class="header-title">
                    <div>AFTER</div>
                    <div>THE</div>
                    <div>NOISE</div>
                </div>
                <p class="subtitle">Quiet intelligence for your conversations</p>

                <form id="loginForm" class="form">
                    <div class="form-group">
                        <label for="loginEmail">Email</label>
                        <input type="email" id="loginEmail" placeholder="admin@example.com" autocomplete="email" required>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="current-password" required>
                    </div>

                    <div class="form-group">
                        <label>Theme</label>
                        <div class="theme-selector-login">
                            <button type="button" class="theme-btn-login" data-theme="anime" title="Anime theme">🖋️</button>
                            <button type="button" class="theme-btn-login" data-theme="signal" title="Signal in Silence theme">📡</button>
                            <button type="button" class="theme-btn-login" data-theme="dark" title="Dark theme">🌙</button>
                            <button type="button" class="theme-btn-login" data-theme="prism" title="PrismPulse theme">🦄</button>
                        </div>
                    </div>

                    <button type="submit" id="submitBtn" class="btn btn-primary">Sign In</button>
                </form>

                <div id="loginError" class="error-message hidden"></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { loginAdmin, applyTheme, setTheme } from './auth.js';

        // Apply saved theme to login page body classes
        const savedTheme = localStorage.getItem('theme') || 'anime';
        applyLoginTheme(savedTheme);

        // Theme selector
        document.querySelectorAll('.theme-btn-login').forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.getAttribute('data-theme');
                applyLoginTheme(theme);
                setTheme(theme);
            });
        });

        function applyLoginTheme(theme) {
            document.body.className = document.body.className
                .replace(/theme-\w+/g, '')
                .trim();
            if (theme !== 'anime') {
                document.body.classList.add(`theme-${theme}`);
            }
            document.querySelectorAll('.theme-btn-login').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-theme') === theme);
            });
        }

        // Login form
        const form = document.getElementById('loginForm');
        const errorEl = document.getElementById('loginError');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            errorEl.classList.add('hidden');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Signing in…';

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            const result = await loginAdmin(email, password);

            if (result.success) {
                window.location.href = '/portfolio.html';
            } else {
                errorEl.textContent = result.error || 'Invalid email or password';
                errorEl.classList.remove('hidden');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Sign In';
            }
        });
    </script>
</body>
</html>
