<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            padding: 2rem;
            background: #f5f5f5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        h1 {
            margin-bottom: 1.5rem;
        }
        .test-item {
            padding: 1rem;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 4px;
            background: #fafafa;
        }
        .test-item.success {
            background: #e6f7e6;
            border-color: #4caf50;
        }
        .test-item.error {
            background: #ffe6e6;
            border-color: #f44336;
        }
        .test-item.loading {
            background: #fff9e6;
            border-color: #ff9800;
        }
        .test-title {
            font-weight: 600;
            margin-bottom: 0.5rem;
        }
        .test-result {
            font-size: 0.9rem;
            margin-top: 0.5rem;
            white-space: pre-wrap;
            word-break: break-all;
        }
        button {
            padding: 0.75rem 1.5rem;
            background: #2196f3;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
        }
        button:hover {
            background: #0b7dda;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Supabase Connection Test</h1>

        <div id="testResults"></div>

        <button onclick="runTests()">Run All Tests</button>
    </div>

    <script type="module">
        window.testResults = [];

        async function runTests() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = '';
            window.testResults = [];

            addTest('Supabase Client Import', 'Testing module import...');

            try {
                const { supabase } = await import('./supabase-client.js');
                updateTest(0, true, 'Supabase client imported successfully');

                // Test connection
                addTest('Supabase Connection', 'Testing database connection...');
                try {
                    const { data, error } = await supabase
                        .from('projects')
                        .select('count')
                        .limit(1);

                    if (error) {
                        updateTest(1, false, `Error: ${error.message}\nCode: ${error.code}\nStatus: ${error.status}`);
                    } else {
                        updateTest(1, true, 'Connection successful - table "projects" exists');
                    }
                } catch (err) {
                    updateTest(1, false, `Exception: ${err.message}`);
                }

                // Fetch projects
                addTest('Fetch Projects', 'Fetching projects from database...');
                try {
                    const { data, error } = await supabase
                        .from('projects')
                        .select('*')
                        .order('created_at', { ascending: false });

                    if (error) {
                        updateTest(2, false, `Error: ${error.message}`);
                    } else if (!data || data.length === 0) {
                        updateTest(2, true, 'Query successful - 0 projects found in database');
                    } else {
                        updateTest(2, true, `Query successful - ${data.length} projects found:\n${JSON.stringify(data, null, 2)}`);
                    }
                } catch (err) {
                    updateTest(2, false, `Exception: ${err.message}`);
                }

            } catch (err) {
                updateTest(0, false, `Failed to import: ${err.message}`);
            }
        }

        function addTest(title, message) {
            window.testResults.push({ title, message, success: null });
            renderResults();
        }

        function updateTest(index, success, message) {
            window.testResults[index].success = success;
            window.testResults[index].message = message;
            renderResults();
        }

        function renderResults() {
            const resultsDiv = document.getElementById('testResults');
            resultsDiv.innerHTML = window.testResults.map((test, i) => {
                let statusClass = '';
                if (test.success === null) {
                    statusClass = 'loading';
                } else if (test.success) {
                    statusClass = 'success';
                } else {
                    statusClass = 'error';
                }

                const statusText = test.success === null ? 'TESTING' : (test.success ? 'PASS' : 'FAIL');

                return `
                    <div class="test-item ${statusClass}">
                        <div class="test-title">[${statusText}] ${test.title}</div>
                        <div class="test-result">${test.message}</div>
                    </div>
                `;
            }).join('');
        }

        window.runTests = runTests;
    </script>
</body>
</html>
