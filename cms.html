<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - CMS</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="cms-header">
        <div class="header-content">
            <h1>Content Management</h1>
            <a href="/portfolio.html" class="btn-back">← Back to Portfolio</a>
        </div>
    </header>

    <main class="cms-main">
        <!-- Tabs -->
        <div class="cms-tabs">
            <button class="cms-tab active" data-tab="blog">Blog Posts</button>
            <button class="cms-tab" data-tab="projects">Projects</button>
        </div>

        <!-- Blog Tab -->
        <section id="blog-tab" class="cms-tab-content active">
            <h2>Blog Posts</h2>

            <div class="cms-actions">
                <button id="newBlogBtn" class="btn-new">+ New Post</button>
            </div>

            <div id="blogList" class="cms-list"></div>

            <!-- Blog Form (hidden by default) -->
            <div id="blogForm" class="cms-form hidden">
                <h3>New Blog Post</h3>
                <form>
                    <div class="form-group">
                        <label>Title</label>

                        <!-- Title Formatting Toolbar -->
                        <div class="editor-toolbar">
                            <div class="toolbar-group">
                                <select id="blogTitleHeading" class="toolbar-select">
                                    <option value="p">Paragraph</option>
                                    <option value="h1">Heading 1</option>
                                    <option value="h2">Heading 2</option>
                                    <option value="h3">Heading 3</option>
                                    <option value="h4">Heading 4</option>
                                    <option value="h5">Heading 5</option>
                                    <option value="h6">Heading 6</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="blogTitleFont" class="toolbar-select">
                                    <option value="inherit">Font</option>
                                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Default</option>
                                    <option value="'Courier New', Courier, monospace">Monospace</option>
                                    <option value="Georgia, serif">Serif</option>
                                    <option value="'Arial Black', Gadget, sans-serif">Arial Black</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="blogTitleSize" class="toolbar-select">
                                    <option value="">Size</option>
                                    <option value="1rem">Normal (16px)</option>
                                    <option value="1.25rem">Large (20px)</option>
                                    <option value="1.5rem">Extra Large (24px)</option>
                                    <option value="2rem">2xl (32px)</option>
                                    <option value="2.5rem">3xl (40px)</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="blogTitleBold" title="Bold">
                                    <strong>B</strong>
                                </button>
                                <button type="button" class="toolbar-btn" id="blogTitleItalic" title="Italic">
                                    <em>I</em>
                                </button>
                                <button type="button" class="toolbar-btn" id="blogTitleUnderline" title="Underline">
                                    <u>U</u>
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="blogTitleClear" title="Clear Formatting">
                                    ✕
                                </button>
                            </div>
                        </div>

                        <!-- Title Editor -->
                        <div id="blogTitleEditor" class="content-editor title-editor" contenteditable="true" required></div>
                        <input type="hidden" id="blogTitle" required>
                    </div>

                    <div class="form-group">
                        <label for="blogExcerpt">Excerpt</label>
                        <textarea id="blogExcerpt" rows="3"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Content</label>

                        <!-- Formatting Toolbar -->
                        <div class="editor-toolbar">
                            <div class="toolbar-group">
                                <select id="blogHeading" class="toolbar-select">
                                    <option value="p">Paragraph</option>
                                    <option value="h1">Heading 1</option>
                                    <option value="h2">Heading 2</option>
                                    <option value="h3">Heading 3</option>
                                    <option value="h4">Heading 4</option>
                                    <option value="h5">Heading 5</option>
                                    <option value="h6">Heading 6</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="blogFont" class="toolbar-select">
                                    <option value="inherit">Font</option>
                                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Default</option>
                                    <option value="'Courier New', Courier, monospace">Monospace</option>
                                    <option value="Georgia, serif">Serif</option>
                                    <option value="'Arial Black', Gadget, sans-serif">Arial Black</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="blogSize" class="toolbar-select">
                                    <option value="">Size</option>
                                    <option value="0.875rem">Small (14px)</option>
                                    <option value="1rem">Normal (16px)</option>
                                    <option value="1.125rem">Medium (18px)</option>
                                    <option value="1.25rem">Large (20px)</option>
                                    <option value="1.5rem">Extra Large (24px)</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="blogBold" title="Bold">
                                    <strong>B</strong>
                                </button>
                                <button type="button" class="toolbar-btn" id="blogItalic" title="Italic">
                                    <em>I</em>
                                </button>
                                <button type="button" class="toolbar-btn" id="blogUnderline" title="Underline">
                                    <u>U</u>
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="blogBullet" title="Bullet List">
                                    •
                                </button>
                                <button type="button" class="toolbar-btn" id="blogNumber" title="Numbered List">
                                    1.
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="blogLink" title="Add Link">
                                    🔗
                                </button>
                                <button type="button" class="toolbar-btn" id="blogClear" title="Clear Formatting">
                                    ✕
                                </button>
                            </div>
                        </div>

                        <!-- Content Editor -->
                        <div id="blogContentEditor" class="content-editor" contenteditable="true" required></div>
                        <input type="hidden" id="blogContent" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Projects Tab -->
        <section id="projects-tab" class="cms-tab-content">
            <h2>Projects</h2>

            <div class="cms-actions">
                <button id="newProjectBtn" class="btn-new">+ New Project</button>
            </div>

            <div id="projectsList" class="cms-list"></div>

            <!-- Project Form (hidden by default) -->
            <div id="projectForm" class="cms-form hidden">
                <h3>New Project</h3>
                <form>
                    <div class="form-group">
                        <label>Title</label>

                        <!-- Title Formatting Toolbar -->
                        <div class="editor-toolbar">
                            <div class="toolbar-group">
                                <select id="projectTitleHeading" class="toolbar-select">
                                    <option value="p">Paragraph</option>
                                    <option value="h1">Heading 1</option>
                                    <option value="h2">Heading 2</option>
                                    <option value="h3">Heading 3</option>
                                    <option value="h4">Heading 4</option>
                                    <option value="h5">Heading 5</option>
                                    <option value="h6">Heading 6</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="projectTitleFont" class="toolbar-select">
                                    <option value="inherit">Font</option>
                                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Default</option>
                                    <option value="'Courier New', Courier, monospace">Monospace</option>
                                    <option value="Georgia, serif">Serif</option>
                                    <option value="'Arial Black', Gadget, sans-serif">Arial Black</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="projectTitleSize" class="toolbar-select">
                                    <option value="">Size</option>
                                    <option value="1rem">Normal (16px)</option>
                                    <option value="1.25rem">Large (20px)</option>
                                    <option value="1.5rem">Extra Large (24px)</option>
                                    <option value="2rem">2xl (32px)</option>
                                    <option value="2.5rem">3xl (40px)</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="projectTitleBold" title="Bold">
                                    <strong>B</strong>
                                </button>
                                <button type="button" class="toolbar-btn" id="projectTitleItalic" title="Italic">
                                    <em>I</em>
                                </button>
                                <button type="button" class="toolbar-btn" id="projectTitleUnderline" title="Underline">
                                    <u>U</u>
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="projectTitleClear" title="Clear Formatting">
                                    ✕
                                </button>
                            </div>
                        </div>

                        <!-- Title Editor -->
                        <div id="projectTitleEditor" class="content-editor title-editor" contenteditable="true" required></div>
                        <input type="hidden" id="projectTitle" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>

                        <!-- Formatting Toolbar -->
                        <div class="editor-toolbar">
                            <div class="toolbar-group">
                                <select id="projectHeading" class="toolbar-select">
                                    <option value="p">Paragraph</option>
                                    <option value="h1">Heading 1</option>
                                    <option value="h2">Heading 2</option>
                                    <option value="h3">Heading 3</option>
                                    <option value="h4">Heading 4</option>
                                    <option value="h5">Heading 5</option>
                                    <option value="h6">Heading 6</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="projectFont" class="toolbar-select">
                                    <option value="inherit">Font</option>
                                    <option value="'Segoe UI', Tahoma, Geneva, Verdana, sans-serif">Default</option>
                                    <option value="'Courier New', Courier, monospace">Monospace</option>
                                    <option value="Georgia, serif">Serif</option>
                                    <option value="'Arial Black', Gadget, sans-serif">Arial Black</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <select id="projectSize" class="toolbar-select">
                                    <option value="">Size</option>
                                    <option value="0.875rem">Small (14px)</option>
                                    <option value="1rem">Normal (16px)</option>
                                    <option value="1.125rem">Medium (18px)</option>
                                    <option value="1.25rem">Large (20px)</option>
                                    <option value="1.5rem">Extra Large (24px)</option>
                                </select>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="projectBold" title="Bold">
                                    <strong>B</strong>
                                </button>
                                <button type="button" class="toolbar-btn" id="projectItalic" title="Italic">
                                    <em>I</em>
                                </button>
                                <button type="button" class="toolbar-btn" id="projectUnderline" title="Underline">
                                    <u>U</u>
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="projectBullet" title="Bullet List">
                                    •
                                </button>
                                <button type="button" class="toolbar-btn" id="projectNumber" title="Numbered List">
                                    1.
                                </button>
                            </div>

                            <div class="toolbar-group">
                                <button type="button" class="toolbar-btn" id="projectLink" title="Add Link">
                                    🔗
                                </button>
                                <button type="button" class="toolbar-btn" id="projectClear" title="Clear Formatting">
                                    ✕
                                </button>
                            </div>
                        </div>

                        <!-- Content Editor -->
                        <div id="projectContentEditor" class="content-editor" contenteditable="true" required></div>
                        <input type="hidden" id="projectDescription" required>
                    </div>

                    <div class="form-group">
                        <label for="projectLink">Project Link</label>
                        <input type="url" id="projectLink">
                    </div>

                    <div class="form-group">
                        <label for="projectTags">Tags (comma-separated)</label>
                        <input type="text" id="projectTags">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- CMS Modal Overlay -->
    <div id="cmsOverlay" class="cms-overlay hidden"></div>

    <!-- CMS Modal -->
    <div id="cmsModal" class="cms-modal hidden">
        <h4 id="cmsModalTitle">Success</h4>
        <p id="cmsModalMessage"></p>
        <div class="cms-modal-actions">
            <button onclick="closeCmsModal()">OK</button>
        </div>
    </div>

    <script type="module" src="cms.js"></script>
</body>
</html>
