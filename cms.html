<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>After The Noise - CMS</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Quill Rich Text Editor -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
</head>
<body>
    <header class="cms-header">
        <div class="header-content">
            <h1>Content Management</h1>
            <div class="header-actions">
                <div class="theme-selector" id="themeSelector">
                    <button class="theme-btn" data-theme="default" title="Default theme">☀️</button>
                    <button class="theme-btn" data-theme="signal" title="Signal theme">📡</button>
                    <button class="theme-btn" data-theme="dark" title="Dark theme">🌙</button>
                    <button class="theme-btn" data-theme="prism" title="Prism theme">🦄</button>
                    <button class="theme-btn" data-theme="pulse" title="Pulse theme">💫</button>
                </div>
                <a href="/portfolio.html" class="btn-back">← Back to Portfolio</a>
            </div>
        </div>
    </header>

    <main class="cms-main">
        <!-- Tabs -->
        <div class="cms-tabs">
            <button class="cms-tab active" data-tab="blog">Blog Posts</button>
            <button class="cms-tab" data-tab="projects">Projects</button>
        </div>

        <!-- Blog Tab -->
        <section id="blog-tab" class="cms-tab-content active">
            <h2>Blog Posts</h2>

            <div class="cms-actions">
                <button id="newBlogBtn" class="btn-new">+ New Post</button>
            </div>

            <div id="blogList" class="cms-list"></div>

            <!-- Blog Form (hidden by default) -->
            <div id="blogForm" class="cms-form hidden">
                <h3>New Blog Post</h3>
                <form>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="blogTitle" placeholder="Enter blog post title" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="blogDescription" placeholder="Enter blog post description" required>
                    </div>

                    <div class="form-group">
                        <label for="blogExcerpt">Excerpt</label>
                        <textarea id="blogExcerpt" rows="3" placeholder="Enter blog post excerpt"></textarea>
                    </div>

                    <div class="form-group">
                        <label>Tags (comma-separated)</label>
                        <input type="text" id="blogTags" placeholder="e.g., design, development, tutorial">
                    </div>

                    <div class="form-group">
                        <label>Content</label>
                        <div id="blogContentEditor" style="height: 400px;"></div>
                        <input type="hidden" id="blogContent" required>
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </section>

        <!-- Projects Tab -->
        <section id="projects-tab" class="cms-tab-content">
            <h2>Projects</h2>

            <div class="cms-actions">
                <button id="newProjectBtn" class="btn-new">+ New Project</button>
            </div>

            <div id="projectsList" class="cms-list"></div>

            <!-- Project Form (hidden by default) -->
            <div id="projectForm" class="cms-form hidden">
                <h3>New Project</h3>
                <form>
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="projectTitle" placeholder="Enter project title" required>
                    </div>

                    <div class="form-group">
                        <label>Description</label>
                        <div id="projectDescriptionEditor" style="height: 200px;"></div>
                        <input type="hidden" id="projectDescription" required>
                    </div>

                    <div class="form-group">
                        <label for="projectLink">Project Link</label>
                        <input type="url" id="projectLink" placeholder="https://example.com">
                    </div>

                    <div class="form-group">
                        <label for="projectTags">Tags (comma-separated)</label>
                        <input type="text" id="projectTags" placeholder="e.g., web, design, react">
                    </div>

                    <div class="form-actions">
                        <button type="submit" class="btn-save">Save</button>
                        <button type="button" class="btn-cancel">Cancel</button>
                    </div>
                </form>
            </div>
        </section>
    </main>

    <!-- CMS Modal Overlay -->
    <div id="cmsOverlay" class="cms-overlay hidden"></div>

    <!-- CMS Modal -->
    <div id="cmsModal" class="cms-modal hidden">
        <h4 id="cmsModalTitle">Success</h4>
        <p id="cmsModalMessage"></p>
        <div class="cms-modal-actions">
            <button onclick="closeCmsModal()">OK</button>
        </div>
    </div>

    <script type="module" src="cms.js"></script>
</body>
</html>
